
; Pin the core version for stability as recommended[citation:2]
; PlatformIO Project Configuration File
[env:az-delivery-devkit-v4]
platform = espressif32
board = az-delivery-devkit-v4
framework = arduino

; Pin the core version for stability as recommended[citation:2]
platform_packages = 
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/2.0.9/esp32-2.0.9.zip

; Serial monitor configuration
monitor_speed = 115200

; Critical libraries for your transmitter modules[citation:5]
lib_deps = 
   ; For LoRa communication:
    jgromes/RadioLib @ ^7.5.0
    ; For the AHT10/AHT20 sensor:
    Adafruit AHTX0
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ; For the I2C LCD:
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    ; For servo motor control on ESP32:
    madhephaestus/ESP32Servo @ ^1.1.0
    ; For NewPing (ultrasonic sensor):
    teckel12/NewPing @ ^1.9.7
    ; For PCF8575 I/O expander: 
    https://github.com/xreef/PCF8575_library.git
; Optional: Increase build buffer size for complex sketches
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -DCONFIG_BT_ENABLED=0
    -DCONFIG_BTDM_CTRL_MODE_BLE_ONLY=0
    -DCONFIG_BLUEDROID_ENABLED=0
    -DCONFIG_BT_NIMBLE_ENABLED=0
    